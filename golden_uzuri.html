<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Uzuri</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rose:    #f2c0c8;
      --rose-deep: #e8a0af;
      --gold:    #c9973a;
      --gold-light: #f0d080;
      --gold-pale: #fdf3dc;
      --dark:    #3a1f10;
      --cream:   #fdf8f2;
      --white:   #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--cream);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background Video */
    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Social icons */
    .socials {
      position: relative;
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
      animation: fadeDown 0.8s ease both;
    }
    .socials a {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .socials a:hover { transform: translateY(-4px) scale(1.08); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }

    /* Instagram gradient */
    .socials .insta {
      background: radial-gradient(circle at 30% 110%, #ffdc80, #fcb045, #fd1d1d, #833ab4, #5851db);
    }
    /* TikTok */
    .socials .tiktok { background: #010101; }

    .socials svg { width: 26px; height: 26px; fill: white; }

    /* Logo */
    .logo-wrap {
      position: relative;
      animation: fadeUp 1s 0.2s ease both;
    }
    .logo-wrap img {
      width: min(340px, 80vw);
      filter: drop-shadow(0 8px 32px rgba(201,151,58,0.35));
      transition: transform 0.4s;
    }
    .logo-wrap img:hover { transform: scale(1.03); }

    /* Decorative divider */
    .divider {
      width: 260px;
      height: 2px;
      margin: 28px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: fadeUp 1s 0.4s ease both;
      opacity: 0;
      animation-fill-mode: both;
    }

    /* ── CONTACTS SECTION ── */
    .contacts {
      position: relative;
      width: 100%;
      margin-top: 36px;
      padding: 0 20px;
      animation: fadeUp 1s 0.6s ease both;
    }

    .contacts-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0;
      max-width: 780px;
      margin: 0 auto;
      border: 1px solid rgba(201,151,58,0.35);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      background: rgba(255,255,255,0.45);
      box-shadow: 0 8px 40px rgba(201,151,58,0.15);
    }

    .contact-card {
      flex: 1 1 220px;
      padding: 28px 24px;
      text-align: center;
      position: relative;
      transition: background 0.3s;
    }
    .contact-card:hover { background: rgba(255,255,255,0.65); }
    .contact-card + .contact-card::before {
      content: '';
      position: absolute; left: 0; top: 16px; bottom: 16px;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(201,151,58,0.5), transparent);
    }

    .contact-flag {
      font-size: 26px;
      margin-bottom: 6px;
    }
    .contact-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
      line-height: 1.3;
    }
    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--dark);
      margin-bottom: 6px;
      opacity: 0.85;
    }
    .contact-item svg { width: 15px; height: 15px; flex-shrink: 0; fill: var(--gold); }

    /* ── COMING SOON LINKS ── */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 28px;
      margin-bottom: 40px;
      animation: fadeUp 1s 0.8s ease both;
    }

    .cs-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 32px;
      border-radius: 40px;
      border: 1.5px solid rgba(201,151,58,0.5);
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(6px);
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--dark);
      letter-spacing: 0.08em;
      text-decoration: none;
      cursor: default;
      transition: box-shadow 0.3s, background 0.3s;
      box-shadow: 0 2px 12px rgba(201,151,58,0.1);
    }
    .cs-link:hover {
      background: rgba(255,255,255,0.75);
      box-shadow: 0 6px 24px rgba(201,151,58,0.2);
    }
    .cs-link svg { width: 18px; height: 18px; fill: var(--gold); }
    .cs-badge {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--gold);
      background: rgba(201,151,58,0.12);
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.72rem;
      color: rgba(58,31,16,0.45);
      letter-spacing: 0.05em;
    }
    footer span { color: var(--gold); }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .contact-card + .contact-card::before { display: none; }
      .contact-card {
        border-top: 1px solid rgba(201,151,58,0.25);
        flex: 1 1 100%;
      }
      .contact-card:first-child { border-top: none; }
    }
  </style>
</head>
